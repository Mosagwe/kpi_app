services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: kpi_appraisal
    ports:
      - "3010:3000"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:

